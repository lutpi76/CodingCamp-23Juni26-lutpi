<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- Header Card -->
    <header>
      <div class="header-top">
        <div class="header-brand">
          <span class="header-icon">💰</span>
          <h1>Expense Tracker</h1>
        </div>
        <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>
      </div>
      <div class="header-stats">
        <div class="balance-card">
          <span class="balance-label">Total Balance</span>
          <span id="total-balance">0.00</span>
        </div>
        <div class="limit-card">
          <label for="spending-limit">Spending Limit</label>
          <input type="number" id="spending-limit" placeholder="e.g. 500" min="0.01" step="0.01" />
        </div>
      </div>
    </header>

    <main>

      <!-- Add Transaction Card -->
      <section id="form-section">
        <h2>Add Transaction</h2>
        <form id="transaction-form">
          <div class="form-row">
            <div class="form-group">
              <label for="item-name">Item Name</label>
              <input type="text" id="item-name" placeholder="e.g. Lunch, Bus fare…" />
            </div>
            <div class="form-group">
              <label for="item-amount">Amount</label>
              <input type="number" id="item-amount" placeholder="0.00" min="0.01" step="0.01" />
            </div>
            <div class="form-group">
              <label for="item-category">Category</label>
              <select id="item-category">
                <option value="Food">🍔 Food</option>
                <option value="Transport">🚌 Transport</option>
                <option value="Fun">🎉 Fun</option>
              </select>
            </div>
          </div>
          <button type="submit">+ Add Transaction</button>
          <p id="form-error" role="alert"></p>
        </form>
      </section>

      <!-- Chart Card -->
      <section id="chart-section">
        <h2>Spending by Category</h2>
        <div class="chart-wrap">
          <canvas id="spending-chart"></canvas>
          <p id="chart-placeholder">No transactions yet — add one above!</p>
        </div>
      </section>

      <!-- Transaction List Card -->
      <section id="list-section">
        <div class="list-header">
          <h2>Transaction List</h2>
          <div class="sort-controls">
            <label for="sort-select">Sort:</label>
            <select id="sort-select">
              <option value="default">Default</option>
              <option value="amount-asc">Amount ↑</option>
              <option value="amount-desc">Amount ↓</option>
              <option value="category-az">Category A–Z</option>
            </select>
          </div>
        </div>
        <p id="empty-state">No transactions yet. Start by adding one above! 👆</p>
        <ul id="transaction-list"></ul>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
